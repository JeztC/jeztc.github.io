<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <link rel="prefetch" href="/gb.svg" as="image" type="image/svg+xml">
    <link rel="prefetch" href="/fi.svg" as="image" type="image/svg+xml">
    <script>
      (function () {
        try {
          var m = localStorage.getItem('mui-mode');
          var dark = m === 'dark' || (m !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.style.backgroundColor = dark ? '#000000' : '#ffffff';
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
