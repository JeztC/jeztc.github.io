<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <link rel="prefetch" href="/gb.svg" as="image" type="image/svg+xml">
    <link rel="prefetch" href="/fi.svg" as="image" type="image/svg+xml">
    <script>
      (function () {
        var redirect = sessionStorage.getItem('spa-redirect');
        if (redirect) {
          sessionStorage.removeItem('spa-redirect');
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
    <script>
      (function () {
        try {
          var m = localStorage.getItem('mui-mode');
          var dark = m === 'dark' || (m !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          var root = document.documentElement;
          root.classList.add('preload');
          root.style.backgroundColor = dark ? '#000000' : '#ffffff';
          root.style.color = dark ? '#ffffff' : '#000000';
          root.style.colorScheme = dark ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>
    <style>
      html.preload, html.preload *, html.preload *::before, html.preload *::after {
        transition: none !important;
        animation: none !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
